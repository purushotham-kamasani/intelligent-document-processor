<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .bg { fill: #f4f6f8; }
      .lane { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
      .lane-label { fill: #57606a; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
      .box { fill: #ffffff; stroke: #156166; stroke-width: 1.5; rx: 6; }
      .box-accent { fill: #156166; stroke: #156166; }
      .box-secondary { fill: #ffffff; stroke: #4a9499; stroke-width: 1; }
      .box-soft { fill: #e8ecef; stroke: #c0c9d1; stroke-width: 1; }
      .box-text { fill: #0f1419; font-size: 13px; font-weight: 500; }
      .box-text-light { fill: #ffffff; font-size: 13px; font-weight: 500; }
      .box-sub { fill: #57606a; font-size: 10px; font-family: 'JetBrains Mono', 'Menlo', monospace; }
      .box-sub-light { fill: #d0d7de; font-size: 10px; font-family: 'JetBrains Mono', 'Menlo', monospace; }
      .title { fill: #0f1419; font-size: 18px; font-weight: 600; }
      .subtitle { fill: #57606a; font-size: 12px; }
      .arrow { stroke: #156166; stroke-width: 1.5; fill: none; }
      .arrow-dashed { stroke: #8a96a3; stroke-width: 1.2; fill: none; stroke-dasharray: 4,3; }
      .arrow-text { fill: #57606a; font-size: 10px; font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#156166" />
    </marker>
    <marker id="arrowhead-dashed" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#8a96a3" />
    </marker>
  </defs>

  <rect width="1200" height="760" class="bg" />

  <text x="40" y="40" class="title">Intelligent Document Processor — Architecture</text>
  <text x="40" y="60" class="subtitle">FastAPI · Async ETL Pipeline · Multi-Stage Workflow · Batch Processing · LLM-Assisted Extraction</text>

  <!-- API Layer -->
  <rect x="40" y="90" width="1120" height="110" class="lane" />
  <text x="55" y="110" class="lane-label">01 · API Layer</text>

  <rect x="80" y="125" width="190" height="60" class="box" />
  <text x="175" y="148" text-anchor="middle" class="box-text">Client</text>
  <text x="175" y="167" text-anchor="middle" class="box-sub">multipart upload</text>

  <rect x="320" y="125" width="220" height="60" class="box" />
  <text x="430" y="148" text-anchor="middle" class="box-text">FastAPI Routes</text>
  <text x="430" y="167" text-anchor="middle" class="box-sub">/v1/documents · /v1/batches</text>

  <rect x="590" y="125" width="200" height="60" class="box" />
  <text x="690" y="148" text-anchor="middle" class="box-text">DocumentService</text>
  <text x="690" y="167" text-anchor="middle" class="box-sub">upload · fetch · batch</text>

  <rect x="840" y="125" width="260" height="60" class="box-soft" />
  <text x="970" y="148" text-anchor="middle" class="box-text">BackgroundTasks</text>
  <text x="970" y="167" text-anchor="middle" class="box-sub">async pipeline scheduling</text>

  <line x1="270" y1="155" x2="320" y2="155" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="540" y1="155" x2="590" y2="155" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="790" y1="155" x2="840" y2="155" class="arrow" marker-end="url(#arrowhead)" />

  <!-- Pipeline -->
  <rect x="40" y="215" width="1120" height="220" class="lane" />
  <text x="55" y="235" class="lane-label">02 · Document Pipeline (per-doc)</text>

  <rect x="80" y="260" width="200" height="150" class="box" />
  <text x="180" y="285" text-anchor="middle" class="box-text">DocumentPipeline</text>
  <text x="180" y="304" text-anchor="middle" class="box-sub">pipeline/pipeline.py</text>
  <line x1="100" y1="318" x2="260" y2="318" stroke="#d0d7de" stroke-width="0.5" />
  <text x="180" y="338" text-anchor="middle" class="box-sub">· stage audit rows</text>
  <text x="180" y="355" text-anchor="middle" class="box-sub">· tenacity retries</text>
  <text x="180" y="372" text-anchor="middle" class="box-sub">· state transitions</text>
  <text x="180" y="389" text-anchor="middle" class="box-sub">· session-safe rollback</text>

  <!-- Stage chain -->
  <rect x="320" y="270" width="120" height="130" class="box-secondary" />
  <text x="380" y="295" text-anchor="middle" class="box-text">preprocess</text>
  <text x="380" y="315" text-anchor="middle" class="box-sub">file read</text>
  <text x="380" y="332" text-anchor="middle" class="box-sub">PDF/text/JSON</text>
  <text x="380" y="354" text-anchor="middle" class="box-sub">→ raw_text</text>

  <rect x="460" y="270" width="120" height="130" class="box-secondary" />
  <text x="520" y="295" text-anchor="middle" class="box-text">classify</text>
  <text x="520" y="315" text-anchor="middle" class="box-sub">if unknown</text>
  <text x="520" y="332" text-anchor="middle" class="box-sub">LLM doctype</text>
  <text x="520" y="354" text-anchor="middle" class="box-sub">→ doc_type</text>

  <rect x="600" y="270" width="120" height="130" class="box-accent" />
  <text x="660" y="295" text-anchor="middle" class="box-text-light">extract</text>
  <text x="660" y="315" text-anchor="middle" class="box-sub-light">LLM call</text>
  <text x="660" y="332" text-anchor="middle" class="box-sub-light">retry × 3</text>
  <text x="660" y="354" text-anchor="middle" class="box-sub-light">→ raw fields</text>

  <rect x="740" y="270" width="120" height="130" class="box-accent" />
  <text x="800" y="295" text-anchor="middle" class="box-text-light">validate</text>
  <text x="800" y="315" text-anchor="middle" class="box-sub-light">Pydantic</text>
  <text x="800" y="332" text-anchor="middle" class="box-sub-light">per-doc schema</text>
  <text x="800" y="354" text-anchor="middle" class="box-sub-light">→ extracted_data</text>

  <rect x="900" y="270" width="200" height="130" class="box" />
  <text x="1000" y="295" text-anchor="middle" class="box-text">Extractor Registry</text>
  <text x="1000" y="315" text-anchor="middle" class="box-sub">extractors/registry.py</text>
  <line x1="920" y1="328" x2="1080" y2="328" stroke="#d0d7de" stroke-width="0.5" />
  <text x="1000" y="346" text-anchor="middle" class="box-sub">· invoice → InvoiceData</text>
  <text x="1000" y="363" text-anchor="middle" class="box-sub">· ticket → SupportTicketData</text>
  <text x="1000" y="380" text-anchor="middle" class="box-sub">· contract → ContractData</text>

  <line x1="280" y1="335" x2="320" y2="335" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="440" y1="335" x2="460" y2="335" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="580" y1="335" x2="600" y2="335" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="720" y1="335" x2="740" y2="335" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="860" y1="335" x2="900" y2="335" class="arrow-dashed" marker-end="url(#arrowhead-dashed)" />
  <text x="875" y="325" class="arrow-text">use</text>

  <line x1="970" y1="185" x2="970" y2="215" class="arrow-dashed" marker-end="url(#arrowhead-dashed)" />
  <text x="980" y="205" class="arrow-text">trigger</text>
  <path d="M 970 220 Q 970 240 700 240 Q 180 240 180 260" class="arrow" marker-end="url(#arrowhead)" />

  <!-- Batch Processor -->
  <rect x="40" y="450" width="540" height="120" class="lane" />
  <text x="55" y="470" class="lane-label">03 · Batch Processor (parallel)</text>

  <rect x="80" y="485" width="200" height="70" class="box" />
  <text x="180" y="510" text-anchor="middle" class="box-text">BatchProcessor</text>
  <text x="180" y="528" text-anchor="middle" class="box-sub">pipeline/batch.py</text>
  <text x="180" y="544" text-anchor="middle" class="box-sub">semaphore-bounded</text>

  <rect x="310" y="485" width="60" height="70" class="box-secondary" />
  <text x="340" y="513" text-anchor="middle" class="box-text">doc 1</text>
  <text x="340" y="535" text-anchor="middle" class="box-sub">async</text>

  <rect x="380" y="485" width="60" height="70" class="box-secondary" />
  <text x="410" y="513" text-anchor="middle" class="box-text">doc 2</text>
  <text x="410" y="535" text-anchor="middle" class="box-sub">async</text>

  <rect x="450" y="485" width="60" height="70" class="box-secondary" />
  <text x="480" y="513" text-anchor="middle" class="box-text">doc 3</text>
  <text x="480" y="535" text-anchor="middle" class="box-sub">async</text>

  <rect x="520" y="485" width="40" height="70" class="box-soft" />
  <text x="540" y="525" text-anchor="middle" class="box-sub">···</text>

  <line x1="280" y1="520" x2="310" y2="520" class="arrow" marker-end="url(#arrowhead)" />

  <!-- LLM & Storage -->
  <rect x="600" y="450" width="560" height="120" class="lane" />
  <text x="615" y="470" class="lane-label">04 · LLM Abstraction · Storage</text>

  <rect x="640" y="485" width="170" height="70" class="box" />
  <text x="725" y="510" text-anchor="middle" class="box-text">LLMClient</text>
  <text x="725" y="528" text-anchor="middle" class="box-sub">llm/base.py</text>
  <text x="725" y="544" text-anchor="middle" class="box-sub">interface</text>

  <rect x="830" y="485" width="100" height="70" class="box-secondary" />
  <text x="880" y="513" text-anchor="middle" class="box-text">MockLLM</text>
  <text x="880" y="533" text-anchor="middle" class="box-sub">deterministic</text>

  <rect x="950" y="485" width="170" height="70" class="box" />
  <text x="1035" y="510" text-anchor="middle" class="box-text">StorageBackend</text>
  <text x="1035" y="528" text-anchor="middle" class="box-sub">LocalDisk · S3-ready</text>
  <text x="1035" y="544" text-anchor="middle" class="box-sub">sha256 · sanitized paths</text>

  <line x1="810" y1="520" x2="830" y2="520" class="arrow-dashed" marker-end="url(#arrowhead-dashed)" />

  <!-- Persistence -->
  <rect x="40" y="590" width="1120" height="105" class="lane" />
  <text x="55" y="610" class="lane-label">05 · Persistence (Snowflake-style schema)</text>

  <rect x="80" y="625" width="160" height="55" class="box" />
  <text x="160" y="648" text-anchor="middle" class="box-text">PostgreSQL</text>
  <text x="160" y="667" text-anchor="middle" class="box-sub">asyncpg · SQLAlchemy 2.0</text>

  <rect x="280" y="625" width="160" height="55" class="box-soft" />
  <text x="360" y="648" text-anchor="middle" class="box-text">documents</text>
  <text x="360" y="667" text-anchor="middle" class="box-sub">file metadata · state</text>

  <rect x="460" y="625" width="180" height="55" class="box-soft" />
  <text x="550" y="648" text-anchor="middle" class="box-text">stage_executions</text>
  <text x="550" y="667" text-anchor="middle" class="box-sub">per-stage audit</text>

  <rect x="660" y="625" width="160" height="55" class="box-soft" />
  <text x="740" y="648" text-anchor="middle" class="box-text">batches</text>
  <text x="740" y="667" text-anchor="middle" class="box-sub">parallel grouping</text>

  <rect x="850" y="625" width="280" height="55" class="box-secondary" />
  <text x="990" y="648" text-anchor="middle" class="box-text">Alembic Migrations</text>
  <text x="990" y="667" text-anchor="middle" class="box-sub">async-aware · enum types</text>

  <line x1="240" y1="652" x2="280" y2="652" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="440" y1="652" x2="460" y2="652" class="arrow" marker-end="url(#arrowhead)" />
  <line x1="640" y1="652" x2="660" y2="652" class="arrow" marker-end="url(#arrowhead)" />

  <!-- Pipeline → DB -->
  <line x1="180" y1="410" x2="180" y2="440" class="arrow" marker-end="url(#arrowhead)" />
  <path d="M 180 445 Q 180 590 160 625" class="arrow" marker-end="url(#arrowhead)" />

  <!-- Footer -->
  <text x="40" y="745" class="subtitle" font-family="'JetBrains Mono', monospace" font-size="10">github.com/purushotham-kamasani/intelligent-document-processor · v0.1.0</text>
</svg>
